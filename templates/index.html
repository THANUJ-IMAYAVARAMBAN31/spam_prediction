<!DOCTYPE html>
<html>
<head>
    <title>Spam Classifier</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            width: 600px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
        }

        textarea {
            width: 90%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .result {
            margin-top: 25px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SMS Spam Classifier</h1>

    <form action="/predict" method="post">
        <textarea name="message" placeholder="Enter your message here..."></textarea>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <div class="result">
            {{ prediction }}
        </div>

        <p><strong>Message:</strong> {{ message }}</p>
    {% endif %}
</div>

</body>
</html>
